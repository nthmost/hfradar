<VirtualHost *:80>
    ServerName hfradar.nthmost.com
    ServerAlias hfradar.nthmost.net hfr.nthmost.com hfr.nthmost.net
    DocumentRoot /var/www/html
    RewriteEngine On
    RewriteRule ^/.well-known/acme-challenge/ - [L]
    RewriteRule ^ https://hfradar.nthmost.com%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName hfradar.nthmost.com
    ServerAlias hfradar.nthmost.net hfr.nthmost.com hfr.nthmost.net
    DocumentRoot /var/www/hfradar

    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/hfradar/fullchain.pem
    SSLCertificateKeyFile /etc/apache2/ssl/hfradar/key.pem

    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8042/
    ProxyPassReverse /api/ http://127.0.0.1:8042/
    ProxyPass        /docs http://127.0.0.1:8042/docs
    ProxyPassReverse /docs http://127.0.0.1:8042/docs
    ProxyPass        /openapi.json http://127.0.0.1:8042/openapi.json
    ProxyPassReverse /openapi.json http://127.0.0.1:8042/openapi.json

    <Directory /var/www/hfradar>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/hfradar-error.log
    CustomLog ${APACHE_LOG_DIR}/hfradar-access.log combined
</VirtualHost>
